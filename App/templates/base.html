<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- WEB LOGO -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link rel="alternate icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <!-- CSS only -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous">
    <!-- Custom CSS -->
    <link
      href="{{ url_for('static', filename='css/style.css') }}"
      rel="stylesheet"
    />
    {{ moment.include_moment() }}
    <title>
      {% if title %} {{ title }} - FPSOpedia {% else %} FPSOpedia {% endif %}
    </title>
  </head>
  <body>
    <navbar>
      <!-- includeing navbar.html -->
      {% include "_navbar.html" %}
    </navbar>
    <main>
      <div class="main container mt-5 text-center">
        {% block content %} {% endblock %}
      </div>
    </main>

    <footer class="text-center text-lg-start bg-light text-muted">
      <!-- Include footer.html -->
      {% include "_footer.html" %}
    </footer>
    <!-- JavaScript Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous">
    </script>

    <!-- Back-to-top button -->
    <button id="backToTop" title="Back to top">&#8679;</button>
    <script>
      const btn = document.getElementById('backToTop');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          btn.style.display = 'flex';
        } else {
          btn.style.display = 'none';
        }
      });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>
  </body>
</html>
